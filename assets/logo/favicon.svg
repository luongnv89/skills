<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Simplified 2-block mark optimized for 16px rendering -->
  <!-- Top block neon -->
  <rect x="1" y="1" width="9" height="5" rx="1.5" fill="#39FF14"/>
  <!-- Connector pixel -->
  <rect x="7" y="6" width="3" height="4" fill="#22C55E"/>
  <!-- Bottom block dark -->
  <rect x="6" y="10" width="9" height="5" rx="1.5" fill="#111111"/>
  <!-- Accent top edge of bottom block -->
  <rect x="6" y="10" width="9" height="1.5" rx="0.5" fill="#22C55E"/>
</svg>
