<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Agent Skills mark: staggered skill-block "S" flow -->
  <!-- Top block (neon) -->
  <rect x="6" y="6" width="34" height="18" rx="5" fill="#39FF14"/>
  <!-- Connector bridge -->
  <rect x="26" y="22" width="10" height="14" rx="0" fill="#22C55E"/>
  <!-- Corner cap on bridge top -->
  <rect x="26" y="22" width="10" height="4" fill="#22C55E"/>
  <!-- Bottom block (black) -->
  <rect x="24" y="34" width="34" height="18" rx="5" fill="#000000"/>
  <!-- Highlight line on bottom block -->
  <rect x="24" y="34" width="34" height="3" rx="1" fill="#22C55E"/>
</svg>
