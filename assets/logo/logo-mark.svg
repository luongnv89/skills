<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Agent Skills mark: hexagonal agent node + skill connector tab
    Hexagon = AI agent core
    Tab/plug = skill snapping in
    Green accent line = active connection
  -->

  <!-- Hexagon body (agent node) -->
  <path d="M32 6 L54 18.5 L54 43.5 L32 56 L10 43.5 L10 18.5 Z" fill="#000000"/>

  <!-- Inner hexagon inset (depth) -->
  <path d="M32 13 L48 22.5 L48 41.5 L32 51 L16 41.5 L16 22.5 Z" fill="#111111"/>

  <!-- Skill plug tab — right side, snapping in -->
  <rect x="48" y="26" width="10" height="12" rx="2" fill="#22C55E"/>
  <!-- Plug prong detail -->
  <rect x="55" y="29" width="5" height="3" rx="1" fill="#16A34A"/>
  <rect x="55" y="34" width="5" height="3" rx="1" fill="#16A34A"/>

  <!-- Connection indicator — green accent line on hex edge -->
  <line x1="48" y1="26" x2="48" y2="38" stroke="#22C55E" stroke-width="2"/>

  <!-- Center dot — agent core -->
  <circle cx="32" cy="32" r="5" fill="#22C55E"/>
  <circle cx="32" cy="32" r="2.5" fill="#000000"/>

  <!-- Circuit lines from center -->
  <line x1="32" y1="27" x2="32" y2="20" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.7" y1="29.5" x2="22" y2="26" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.7" y1="34.5" x2="22" y2="38" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
</svg>
