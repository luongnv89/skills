<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 72" fill="none">
  <defs>
    <style>
      .w1 { font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif; font-weight: 700; font-size: 28px; letter-spacing: -0.8px; }
      .w2 { font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif; font-weight: 400; font-size: 28px; letter-spacing: -0.4px; }
    </style>
  </defs>

  <!-- Mark: hexagonal agent node (scaled to 56px tall, centered at y=36) -->
  <!-- Hex: center 34,36 radius ~27 -->
  <path d="M34 9 L57.4 22.5 L57.4 49.5 L34 63 L10.6 49.5 L10.6 22.5 Z" fill="#000000"/>
  <path d="M34 16 L51.4 26 L51.4 46 L34 56 L16.6 46 L16.6 26 Z" fill="#111111"/>

  <!-- Skill plug tab -->
  <rect x="51" y="28" width="10" height="16" rx="2" fill="#22C55E"/>
  <rect x="58" y="31" width="5" height="4" rx="1" fill="#16A34A"/>
  <rect x="58" y="37" width="5" height="4" rx="1" fill="#16A34A"/>
  <line x1="51" y1="28" x2="51" y2="44" stroke="#22C55E" stroke-width="1.5"/>

  <!-- Agent core -->
  <circle cx="34" cy="36" r="6" fill="#22C55E"/>
  <circle cx="34" cy="36" r="3" fill="#000000"/>

  <!-- Circuit spokes -->
  <line x1="34" y1="30" x2="34" y2="23" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.8" y1="33" x2="23" y2="29.5" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.8" y1="39" x2="23" y2="42.5" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Divider -->
  <rect x="84" y="16" width="1" height="40" fill="#E5E7EB"/>

  <!-- Wordmark: "Agent" bold + "Skills" regular -->
  <text x="98" y="47" class="w1" fill="#000000">Agent</text>
  <text x="222" y="47" class="w2" fill="#22C55E">Skills</text>
</svg>
